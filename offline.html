<!doctype html>
<html lang="en-NZ">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | Scaffold Field App</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        background: #f8fafc;
        color: #0f172a;
        margin: 0;
        padding: 24px;
      }
      .card {
        max-width: 520px;
        margin: 48px auto;
        background: white;
        border: 1px solid #dbe3ef;
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      }
      h1 { margin-top: 0; }
      p { line-height: 1.55; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>
        The app shell is still available. If you were already using the app, your draft forms and queued records stay on this device.
      </p>
      <p>
        Reconnect to the internet and reopen the app to sync queued attendance and task logs.
      </p>
    </div>
  </body>
</html>
