<!doctype html>
<html lang="en-NZ">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>Offline | Leader Field Operations</title>
    <script>
      (() => {
        try {
          const savedTheme = localStorage.getItem('leader-theme');
          const theme = savedTheme === 'light' ? 'light' : 'dark';
          document.documentElement.dataset.theme = theme;
          document.querySelector('meta[name="theme-color"]')?.setAttribute('content', theme === 'light' ? '#f4f7fb' : '#000000');
        } catch {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
    <style>
      :root {
        --dark: #03070d;
        --navy: #071425;
        --ink: #f8fbff;
        --brand-blue: #096cf5;
        --brand-blue-soft: #d9e9f8;
        --champagne: #c8a96a;
        --line: rgba(217, 233, 248, 0.18);
        --page-background: #000000;
        --card-background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.105), rgba(255, 255, 255, 0.052)),
          rgba(7, 20, 37, 0.92);
        --heading-color: #f8fbff;
        --copy-color: #c9d5e4;
        --logo-background: transparent;
        --logo-padding: 0;
        --logo-radius: 0;
        --logo-filter: none;
      }
      html[data-theme="light"] {
        --dark: #f4f7fb;
        --navy: #ffffff;
        --ink: #0d1726;
        --brand-blue-soft: #075dcc;
        --line: rgba(7, 20, 37, 0.14);
        --page-background:
          linear-gradient(180deg, rgba(9, 108, 245, 0.1) 0, rgba(9, 108, 245, 0) 240px),
          #f4f7fb;
        --card-background: #ffffff;
        --heading-color: #0d1726;
        --copy-color: #58677b;
        --logo-background: transparent;
        --logo-padding: 0;
        --logo-radius: 0;
        --logo-filter:
          drop-shadow(0 1px 0 rgba(3, 7, 13, 0.82))
          drop-shadow(0 -1px 0 rgba(3, 7, 13, 0.52))
          drop-shadow(1px 0 0 rgba(3, 7, 13, 0.52));
      }
      body {
        font-family: "Segoe UI", Roboto, Arial, Helvetica, sans-serif;
        background: var(--page-background);
        color: var(--ink);
        margin: 0;
        padding: 24px;
      }
      .card {
        max-width: 520px;
        margin: 48px auto;
        background: var(--card-background);
        border: 1px solid var(--line);
        border-top: 5px solid var(--champagne);
        border-radius: 8px;
        padding: 24px;
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.34), 0 8px 24px rgba(3, 7, 13, 0.26);
      }
      .logo {
        width: min(260px, 100%);
        height: auto;
        display: block;
        margin-bottom: 18px;
        padding: var(--logo-padding);
        background: var(--logo-background);
        border-radius: var(--logo-radius);
        filter: var(--logo-filter);
      }
      h1 { margin-top: 0; color: var(--heading-color); }
      .eyebrow {
        color: var(--champagne);
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-size: 0.78rem;
      }
      p {
        color: var(--copy-color);
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="logo" src="/assets/icons/leader-logo-export.png" alt="Leader Scaffolding" />
      <p class="eyebrow">Field Operations</p>
      <h1>You are offline</h1>
      <p>
        The app shell is still available. If you were already using the app, your draft forms and queued records stay on this device.
      </p>
      <p>
        Reconnect to the internet and reopen the app to sync queued attendance and task logs.
      </p>
    </div>
  </body>
</html>
