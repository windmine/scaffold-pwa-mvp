<!doctype html>
<html lang="en-NZ">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | Leader Field Operations</title>
    <style>
      :root {
        --dark: #05070a;
        --ink: #0d1726;
        --brand-blue: #096cf5;
        --brand-blue-soft: #d9e9f8;
        --line: #d8e4f2;
      }
      body {
        font-family: "Segoe UI", Roboto, Arial, Helvetica, sans-serif;
        background:
          linear-gradient(180deg, var(--dark) 0 120px, #edf3fb 120px 100%);
        color: var(--ink);
        margin: 0;
        padding: 24px;
      }
      .card {
        max-width: 520px;
        margin: 48px auto;
        background: white;
        border: 1px solid var(--line);
        border-top: 5px solid var(--brand-blue);
        border-radius: 8px;
        padding: 24px;
        box-shadow: 0 18px 42px rgba(8, 28, 58, 0.12);
      }
      .logo {
        width: min(260px, 100%);
        height: auto;
        display: block;
        margin-bottom: 18px;
        padding: 10px;
        background: linear-gradient(135deg, var(--dark), #08244d);
        border-radius: 6px;
      }
      h1 { margin-top: 0; }
      .eyebrow {
        color: var(--brand-blue);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 0.78rem;
      }
      p { line-height: 1.55; }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="logo" src="/assets/icons/leader-logo.svg" alt="Leader Scaffolding" />
      <p class="eyebrow">Field Operations</p>
      <h1>You are offline</h1>
      <p>
        The app shell is still available. If you were already using the app, your draft forms and queued records stay on this device.
      </p>
      <p>
        Reconnect to the internet and reopen the app to sync queued attendance and task logs.
      </p>
    </div>
  </body>
</html>
